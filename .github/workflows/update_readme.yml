name: Update README with changes

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write  # Необходимо для push изменений обратно в репозиторий

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}  # Используем автоматический токен

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-dotenv GitPython
        
    - name: Update README
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      run: python .github/scripts/update_readme.py
      
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add README.md
        git diff --cached --quiet || git commit -m "Auto-update README with changes [skip ci]"
        git push