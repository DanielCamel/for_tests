# workflow для записи остановок
name: Build Stop Recorder

on:
  workflow_dispatch:
    inputs:
      stop_reason:
        description: 'Reason for build stop'
        required: true
        type: string
      commit_sha:
        description: 'Commit SHA'
        required: true
        type: string
      branch:
        description: 'Branch name'
        required: true
        type: string
      project_name:
        description: 'Project name'
        required: true
        type: string

jobs:
  record-build-stop:
    name: Record Build Stop
    runs-on: ubuntu-latest
    steps:
      - name: Record build stop reason
        run: |
          echo "🛑 Build Stop Recorded"
          echo "## 🛑 Сборка остановлена" >> $GITHUB_STEP_SUMMARY
          echo "**Проект:** ${{ github.event.inputs.project_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Причина:** ${{ github.event.inputs.stop_reason }}" >> $GITHUB_STEP_SUMMARY
          echo "**Коммит:** ${{ github.event.inputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Ветка:** ${{ github.event.inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Время записи:** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Детали остановки:" >> $GITHUB_STEP_SUMMARY
          echo "- Push был остановлен на клиенте" >> $GITHUB_STEP_SUMMARY
          echo "- Параметр BUILD_STOP_VALUE = true" >> $GITHUB_STEP_SUMMARY
          echo "- Сборка не была запущена" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Для возобновления сборки установите BUILD_STOP_VALUE = false" >> $GITHUB_STEP_SUMMARY
          
          # Создаем аннотацию для UI
          echo "::error title=Build Stopped::${{ github.event.inputs.stop_reason }}"
          
          # Завершаем с ошибкой чтобы запись была видна в истории
          exit 1
