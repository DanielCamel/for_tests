name: CI Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  check-stop:
    runs-on: ubuntu-latest
    outputs:
      stop_build: ${{ steps.check.outputs.stop_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Get BUILD_STOP_VALUE
        run: .github/scripts/getupdatedata_api.sh

      - name: Check if build should stop
        id: check
        run: |
          if [ -f .github/build_stop.txt ] && grep -q "true" .github/build_stop.txt; then
            echo "Build stop flag detected."
            echo "stop_build=true" >> $GITHUB_OUTPUT
          else
            echo "No stop flag, continue build."
            echo "stop_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check-stop
    if: needs.check-stop.outputs.stop_build == 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: echo "🚀 Build running..."
