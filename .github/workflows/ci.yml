name: CI Pipeline

on:
  push:
    branches:
      - '**'

jobs:
  check-stop:
    runs-on: ubuntu-latest
    outputs:
      stop_build: ${{ steps.check.outputs.stop_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Check build stop flag
        id: check
        run: |
          LAST_MSG=$(git log -1 --pretty=%B)
          if [[ "$LAST_MSG" == *"[WARNING]"* ]]; then
            echo "stop_build=true" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "stop_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check-stop
    if: needs.check-stop.outputs.stop_build == 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: echo "Сборка продолжается..."
