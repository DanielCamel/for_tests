name: CI Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  check-stop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check build_stop flag
        run: |
          if [ -f .github/build_stop.txt ] && grep -q "true" .github/build_stop.txt; then
            echo "🛑 Build stop flag detected. Exiting workflow."
            exit 1
          fi
