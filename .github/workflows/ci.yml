name: CI Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  check-stop:
    runs-on: ubuntu-latest
    outputs:
      stop_build: ${{ steps.check.outputs.stop_build }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if build should stop
        id: check
        run: |
          if [ -f .github/scripts/build_stop.txt ]; then
            VALUE=$(cat .github/scripts/build_stop.txt | tr -d '[:space:]')
            echo "Detected build_stop.txt with value: $VALUE"
            if [ "$VALUE" = "true" ]; then
              echo "🛑 Build stop flag detected. Stopping pipeline."
              echo "stop_build=true" >> $GITHUB_OUTPUT
              exit 0
            else
              echo "✅ Continue build."
              echo "stop_build=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "⚠️ No build_stop.txt file found — continuing build.."
            echo "stop_build=false" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    needs: check-stop
    if: needs.check-stop.outputs.stop_build == 'false'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: echo "🚀 Build running..."
